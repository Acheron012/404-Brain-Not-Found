services:
  backend:
    build:
      context: .
      dockerfile: schedly/Dockerfile
    container_name: schedly-backend
    working_dir: /app/schedly
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ./schedly:/app/schedly
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: schedly-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: "http://backend:8000"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  frontend_node_modules:
